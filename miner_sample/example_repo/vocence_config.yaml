# PromptTTS settings read by the canonical wrapper and your miner.py.
# model_id MUST equal VOCENCE_REPO (the HF repo you commit on chain) — the wrapper
# refuses to start otherwise. miner.py must load weights via from_pretrained(model_id).
model_id: "your-hf-user/your-repo-name"

runtime:
  adapter: "example"
  device_preference: "cuda"
  dtype: "float32"

generation:
  sample_rate: 24000
  max_seconds: 20
  guidance_scale: 1.0

io:
  output_format: "wav"

limits:
  max_text_chars: 2000
  max_instruction_chars: 600
