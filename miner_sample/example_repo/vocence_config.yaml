# PromptTTS settings read by the canonical wrapper and your miner.py.
# model_name MUST equal the value you commit on chain (and the rendered VOCENCE_REPO
# in the wrapper). The wrapper refuses to start otherwise. miner.py must load weights
# via from_pretrained(model_name).
model_name: "your-hf-user/your-repo-name"

runtime:
  adapter: "example"
  device_preference: "cuda"
  dtype: "float32"

generation:
  sample_rate: 24000
  max_seconds: 20
  guidance_scale: 1.0

io:
  output_format: "wav"

limits:
  max_text_chars: 2000
  max_instruction_chars: 600
